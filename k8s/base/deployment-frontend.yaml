apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: sigloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/sigloop-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          env:
            - name: VITE_CONVEX_URL
              valueFrom:
                configMapKeyRef:
                  name: sigloop-config
                  key: VITE_CONVEX_URL
            - name: VITE_CARD_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: sigloop-config
                  key: VITE_CARD_SERVICE_URL
            - name: VITE_PRIVY_APP_ID
              valueFrom:
                secretKeyRef:
                  name: sigloop-secrets
                  key: PRIVY_APP_ID
                  optional: true
          readinessProbe:
            httpGet:
              path: /app/
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /app/
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
